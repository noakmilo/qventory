{% extends "base_new.html" %}
{% block title %}List on eBay – Qventory{% endblock %}

{% block content %}
<div class="list-wizard">
  <div class="page-header">
    <h1 class="page-title"><i class="fab fa-ebay"></i> List on eBay</h1>
    <p class="page-subtitle">Create a new eBay listing</p>
  </div>

  <div class="wizard-status" id="wizardStatus">Draft not loaded.</div>

  <div class="card">
    <h2>Basic Info</h2>
    <div class="form-grid">
      <div>
        <label class="label">Title</label>
        <input class="input" type="text" id="titleInput" maxlength="80" placeholder="Item title">
      </div>
      <div>
        <label class="label">SKU</label>
        <input class="input" type="text" id="skuInput" placeholder="SKU">
      </div>
      <div>
        <label class="label">Condition</label>
        <select class="input" id="conditionInput">
          <option value="">Select condition</option>
          <option value="NEW">New</option>
          <option value="USED_EXCELLENT">Used - Excellent</option>
          <option value="USED_GOOD">Used - Good</option>
          <option value="USED_FAIR">Used - Fair</option>
        </select>
      </div>
      <div>
        <label class="label">Quantity</label>
        <input class="input" type="number" id="quantityInput" min="1" value="1">
      </div>
      <div>
        <label class="label">Price</label>
        <input class="input" type="number" id="priceInput" min="0" step="0.01" placeholder="0.00">
      </div>
      <div>
        <label class="label">Currency</label>
        <select class="input" id="currencyInput">
          <option value="USD">USD</option>
        </select>
      </div>
    </div>

    <div style="margin-top:16px;">
      <div class="editor-header">
        <h3 style="margin:0;">Description</h3>
        <div class="editor-toggle">
          <button class="btn btn-small active" id="visualModeBtn">Visual</button>
          <button class="btn btn-small" id="htmlModeBtn">HTML</button>
        </div>
      </div>
      <div class="editor-toolbar">
        <button class="btn btn-small" data-cmd="bold"><strong>B</strong></button>
        <button class="btn btn-small" data-cmd="italic"><em>I</em></button>
        <button class="btn btn-small" data-cmd="underline"><u>U</u></button>
        <button class="btn btn-small" data-cmd="insertUnorderedList">• List</button>
        <button class="btn btn-small" data-cmd="insertOrderedList">1. List</button>
      </div>
      <div id="visualEditor" class="visual-editor" contenteditable="true"></div>
      <textarea class="input" id="descriptionHtmlInput" rows="8" style="display:none;"></textarea>
    </div>
  </div>

  <div class="card">
    <h2>Policies</h2>
    <div class="form-grid">
      <div>
        <label class="label">Fulfillment Policy</label>
        <select class="input" id="fulfillmentPolicySelect"></select>
      </div>
      <div>
        <label class="label">Payment Policy</label>
        <select class="input" id="paymentPolicySelect"></select>
      </div>
      <div>
        <label class="label">Return Policy</label>
        <select class="input" id="returnPolicySelect"></select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Category</h2>
    <div class="category-search">
      <input class="input" type="text" id="categorySearchInput" placeholder="Search categories...">
      <button class="btn" id="categorySearchBtn">Search</button>
      <div class="autocomplete" id="categoryAutocomplete"></div>
    </div>
    <div class="category-tree" id="categoryTree"></div>
    <div class="category-selected" id="categorySelected"></div>
  </div>

  <div class="card">
    <h2>Item Specifics</h2>
    <button class="btn" id="refreshSpecificsBtn" style="margin-bottom:8px;">Refresh Specifics</button>
    <div id="specificsContainer" class="specifics-grid"></div>
    <div class="muted" style="margin-top:8px;">Required fields are marked.</div>
  </div>

  <div class="card">
    <h2>Images</h2>
    <input type="file" id="imageInput" accept="image/*" multiple>
    <div class="image-tools">
      <div class="image-editor">
        <div class="editor-preview">
          <canvas id="editorCanvas" width="320" height="320"></canvas>
        </div>
        <div class="editor-controls">
          <label>Aspect
            <select id="aspectSelect">
              <option value="original">Original</option>
              <option value="1:1">1:1</option>
              <option value="4:3">4:3</option>
              <option value="3:4">3:4</option>
            </select>
          </label>
          <label>Brightness <input type="range" id="brightnessRange" min="-50" max="50" value="0"></label>
          <label>Contrast <input type="range" id="contrastRange" min="-50" max="50" value="0"></label>
          <button class="btn" id="applyEditsBtn">Apply to Selected</button>
        </div>
      </div>
      <div class="image-list" id="imageList"></div>
    </div>
  </div>

  <div class="card">
    <h2>Review & Publish</h2>
    <div id="reviewSummary"></div>
    <div class="review-actions">
      <button class="btn" id="saveDraftBtn">Save Draft</button>
      <button class="btn btn-primary" id="publishBtn">List on eBay</button>
    </div>
    <div id="publishStatus" class="muted"></div>
  </div>
</div>

<style>
  .list-wizard .wizard-status { margin-bottom:12px; color:var(--sub); font-size:13px; }
  .list-wizard .form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:12px; }
  .list-wizard .editor-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .list-wizard .editor-toggle { display:flex; gap:6px; }
  .list-wizard .editor-toolbar { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
  .list-wizard .visual-editor { min-height:160px; border:1px solid var(--border); border-radius:8px; padding:10px; background:rgba(255,255,255,0.02); }
  .list-wizard .category-search { display:flex; gap:8px; margin-bottom:12px; position:relative; }
  .list-wizard .autocomplete { position:absolute; top:44px; left:0; right:0; background:var(--card); border:1px solid var(--border); border-radius:8px; display:none; z-index:5; }
  .list-wizard .autocomplete .item { padding:8px 10px; cursor:pointer; }
  .list-wizard .autocomplete .item:hover { background:rgba(59,130,246,0.1); }
  .list-wizard .category-tree { max-height:320px; overflow:auto; border:1px solid var(--border); border-radius:8px; padding:8px; }
  .list-wizard .category-node { padding:4px 6px; cursor:pointer; }
  .list-wizard .category-node.leaf { color:#93c5fd; }
  .list-wizard .specifics-grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); }
  .list-wizard .image-tools { display:grid; grid-template-columns:320px 1fr; gap:16px; }
  .list-wizard .image-list { display:flex; flex-wrap:wrap; gap:10px; }
  .list-wizard .image-card { width:140px; border:1px solid var(--border); border-radius:10px; padding:6px; background:var(--card); cursor:grab; }
  .list-wizard .image-card img { width:100%; height:100px; object-fit:cover; border-radius:6px; }
  .list-wizard .review-actions { display:flex; gap:10px; margin-top:12px; }
  .list-wizard .muted { color:var(--sub); font-size:12px; }
  @media (max-width: 800px) {
    .list-wizard .image-tools { grid-template-columns:1fr; }
  }
</style>

<script>
  window.EBAY_LIST_CONFIG = {
    draftCreateUrl: "{{ url_for('ebay_list.create_draft') }}",
    draftBaseUrl: "{{ url_for('ebay_list.get_draft', draft_id=0) }}".replace("/0", ""),
    draftPublishUrl: "{{ url_for('ebay_list.publish_draft', draft_id=0) }}".replace("/0", ""),
    categoriesUrl: "{{ url_for('main.api_ebay_categories') }}",
    specificsUrl: "{{ url_for('ebay_list.get_category_specifics_api', category_id='0') }}".replace("/0", ""),
    specificsRefreshUrl: "{{ url_for('ebay_list.refresh_category_specifics', category_id='0') }}".replace("/0", ""),
    uploadTokenUrl: "{{ url_for('ebay_list.get_upload_token') }}",
    imageConfirmUrl: "{{ url_for('ebay_list.confirm_upload') }}",
    policiesUrl: "{{ url_for('ebay_list.get_account_policies_api') }}",
    locationsUrl: "{{ url_for('ebay_list.get_account_locations_api') }}"
  };
</script>
<script src="{{ url_for('static', filename='ebay_list.js') }}"></script>
{% endblock %}
